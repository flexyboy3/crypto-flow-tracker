<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Flow Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      color: #58a6ff;
    }

    header p {
      color: #8b949e;
      margin-top: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
    }

    .card h2 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      color: #58a6ff;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.95rem;
    }

    .row:last-child { border-bottom: none; }

    .label { color: #8b949e; }

    .value { font-weight: 600; }

    .regime {
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 8px;
      text-align: center;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .ACCUMULATION { background: #1a3a1a; color: #3fb950; border: 1px solid #3fb950; }
    .DISTRIBUTION { background: #3a1a1a; color: #f85149; border: 1px solid #f85149; }
    .NEUTRAL { background: #2a2a1a; color: #d29922; border: 1px solid #d29922; }

    .loading {
      text-align: center;
      color: #8b949e;
      margin-top: 60px;
      font-size: 1.1rem;
    }

    .refresh {
      display: block;
      margin: 32px auto 0;
      padding: 10px 28px;
      background: #1f6feb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }

    .refresh:hover { background: #388bfd; }
  </style>
</head>
<body>

  <header>
    <h1>🔍 Crypto Flow Tracker</h1>
    <p>Live BTC, ETH & SOL exchange flow signals</p>
  </header>

  <div id="output" class="loading">Loading data...</div>

  <button class="refresh" onclick="fetchData()">🔄 Refresh</button>

  <script>
    const API_URL ="https://crypto-flow-tracker-1.onrender.com/api/crypto";

    function fmt(n) {
      return Number(n).toLocaleString("en-US", { maximumFractionDigits: 2 });
    }

    async function fetchData() {
      const output = document.getElementById("output");
      output.innerHTML = '<p class="loading">Loading data...</p>';

      try {
        const res = await fetch(API_URL);
        const coins = await res.json();

        output.className = "grid";
        output.innerHTML = coins.map(coin => `
          <div class="card">
            <h2>${coin.symbol}</h2>
            <div class="row"><span class="label">Price</span><span class="value">$${fmt(coin.price)}</span></div>
            <div class="row"><span class="label">24h Change</span><span class="value">${fmt(coin.change_24h)}%</span></div>
            <div class="row"><span class="label">24h High</span><span class="value">$${fmt(coin.high_24h)}</span></div>
            <div class="row"><span class="label">24h Low</span><span class="value">$${fmt(coin.low_24h)}</span></div>
            <div class="row"><span class="label">Volume</span><span class="value">$${fmt(coin.volume_24h)}</span></div>
            <div class="row"><span class="label">Market Cap</span><span class="value">$${fmt(coin.market_cap)}</span></div>
            <div class="regime ${coin.regime}">${coin.regime}</div>
          </div>
        `).join("");

      } catch (err) {
        output.innerHTML = `<p class="loading">Error loading data. Is the backend running?</p>`;
      }
    }

    fetchData();
  </script>

</body>
</html>
